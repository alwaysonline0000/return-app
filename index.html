const supportResources={global:{crisis:"https://findahelpline.com/"},regions:{US:{emergency:"tel:911",crisis:"https://988lifeline.org/"},GB:{emergency:"tel:999",crisis:"https://www.samaritans.org/"},ES:{emergency:"tel:112",crisis:"https://findahelpline.com/countries/es"}}};
let lang=localStorage.getItem("return-lang")||localStorage.getItem("pause-lang")||"en",view="home",bodyStep=0,mindStep=0,mindAnswers=[],kitCat=0,timer=null,timerSec=180,timerRun=true,currentType="body",rating="",helped="",completionId="";
const $=s=>document.querySelector(s),T=()=>translations[lang],esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
function read(key,fallback=[]){try{return JSON.parse(localStorage.getItem(key))||fallback}catch{return fallback}}function add(key,v,limit=100){const x=read(key);x.unshift(v);localStorage.setItem(key,JSON.stringify(x.slice(0,limit)))}
function clear(){if(timer){clearTimeout(timer);clearInterval(timer)}timer=null}function go(v){clear();view=v;window.scrollTo({top:0,behavior:"smooth"});render()}function saveLang(x){lang=x;localStorage.setItem("return-lang",x);render()}
function langButtons(){return Object.entries(translations).map(([k,v])=>`<button class="${k===lang?"active":""}" data-lang="${k}">${v.label}</button>`).join("")}
function render(){clear();document.documentElement.lang=lang==="zh"?"zh-CN":lang==="zhTW"?"zh-Hant":lang;document.title=`Return — ${T().title}`;$("#langs").innerHTML=langButtons();$("#footer").textContent=T().footer;$("#view").innerHTML=views[view]();bind()}
function lastHelp(){const x=localStorage.getItem("return-last-help")??localStorage.getItem("pause-last-help");return x!==null?T().feedback.opts[+x]:""}
const views={
home:()=>`<main class="home"><p class="eyebrow">${T().eyebrow}</p><h1 class="serif hero-brand">${T().title}</h1><h2 class="serif hero-line">${T().hero}</h2><p class="hero-copy">${T().sub}</p><div class="hero-actions"><button class="primary" data-go="body">${T().start}</button><button class="secondary" data-go="help">${T().helpNow}</button></div>${lastHelp()?`<div class="memory"><span>${T().feedback.last.replace("{item}",esc(lastHelp()))}</span><button data-go="body">→</button></div>`:""}<section class="return-moment"><div class="glass moment-copy"><p class="eyebrow">${T().moment.label}</p><h2 class="serif">${T().moment.title}</h2><p>${T().moment.copy}</p><div class="hero-actions"><button class="primary" data-go="breath">${T().moment.cta}</button></div></div><div class="glass moment-side"><button class="soft-orb" data-go="breath"><strong>${T().moment.cta}</strong><small>${T().moment.label}</small></button></div></section><section class="pathways"><div class="section-head"><div><p class="eyebrow">${T().ways}</p><h2 class="serif">${T().ways}</h2></div></div><div class="path-grid">${["mind","help","kit"].map((k,i)=>`<button class="path" data-go="${k}"><div class="path-orb p${i+1}"></div><span>0${i+1}</span><h3 class="serif">${T().modules[k][0]}</h3><p>${T().modules[k][1]}</p></button>`).join("")}</div></section></main>`,
body:()=>bodyView(),breath:()=>breathView(),mind:()=>mindView(),help:()=>helpView(),kit:()=>kitView(),feedback:()=>feedbackView()
};
function back(){return `<button class="back" data-go="home">← ${T().back}</button>`}
function bodyView(){const b=T().body;if(bodyStep===2)return breathView(true);if(bodyStep===5)return timerView();return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${b.label} · ${bodyStep+1}/6</p><h1 class="serif stage-title">${b.steps[bodyStep]}</h1><p class="stage-copy">${b.notes[bodyStep]}</p><div class="actions"><button class="primary" data-body-next>${T().done}</button></div></section></main>`}
function breathView(inSequence=false){return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${T().body.breathe}</p><div class="breath in" id="breath"><strong id="breathWord">${T().body.inhale}</strong><small id="breathTime">4 ${T().body.seconds}</small></div><p class="stage-copy">${T().body.notes[2]}</p><div class="actions"><button class="primary" ${inSequence?"data-body-next":"data-finish"}>${T().done}</button></div></section></main>`}
function timerView(){return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${T().body.walk}</p><div class="timer" id="timerRing"><div><strong id="timerText">03:00</strong><small>${T().body.walking}</small></div></div><div class="actions"><button class="secondary" id="timerToggle">${T().body.pause}</button><button class="primary" data-finish>${T().done}</button></div></section></main>`}
function mindView(){const m=T().mind;if(mindStep<3)return `<main class="screen">${back()}<section class="glass question"><div class="progress">${m.questions.map((_,i)=>`<span class="${i<=mindStep?"on":""}"></span>`).join("")}</div><p class="eyebrow">${m.label}</p><h1 class="serif">${m.questions[mindStep]}</h1><textarea class="input" id="answer" placeholder="${m.placeholder}">${esc(mindAnswers[mindStep]||"")}</textarea><div class="actions"><button class="primary" id="mindNext">${T().next}</button></div></section></main>`;if(mindStep===3)return `<main class="screen">${back()}<section class="glass question"><div class="progress">${m.questions.map(()=>`<span class="on"></span>`).join("")}</div><p class="eyebrow">${m.label}</p><h1 class="serif">${m.questions[3]}</h1><div class="binary"><button class="primary" data-mind="yes">${m.yes}</button><button class="secondary" data-mind="no">${m.no}</button></div></section></main>`;const yes=mindStep===4;return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${m.label}</p><h1 class="serif stage-title">${yes?m.step:m.rest}</h1><p class="stage-copy">${yes?m.stepCopy:m.restCopy}</p>${yes?`<textarea class="input" placeholder="${m.step}"></textarea>`:""}<div class="actions"><button class="primary" ${yes?"data-finish":"data-go='body'"}>${yes?T().done:m.body}</button></div></section></main>`}
function helpView(){return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${T().modules.help[0]}</p><h1 class="serif stage-title">${T().help.question}</h1><div class="binary"><button class="secondary" data-help="calm">${T().help.no}</button><button class="primary" data-help="support">${T().help.yes}</button></div></section></main>`}
function helpCalm(){return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${T().moment.label}</p><h1 class="serif stage-title">${T().help.calm}</h1><p class="stage-copy">${T().help.calmCopy}</p><div class="actions"><button class="primary" data-go="breath">${T().moment.cta}</button></div></section></main>`}
function helpSupport(){return `<main class="screen">${back()}<section class="glass question"><p class="eyebrow">${T().help.support}</p><h1 class="serif">${T().help.support}</h1><p class="stage-copy" style="margin-left:0">${T().help.supportCopy}</p><div class="support-list"><button id="emergencyInfo">${T().help.emergency}<span>→</span></button><button id="copyTrust">${T().help.trusted}<span>→</span></button><a href="${supportResources.global.crisis}" target="_blank" rel="noopener">${T().help.crisis}<span>→</span></a></div><p class="warning">${T().help.danger}</p></section></main>`}
function kitData(){return read("return-kit",read("pause-kit",[[],[],[],[],[]]))}function kitView(){const k=T().kit,d=kitData();return `<main class="screen">${back()}<p class="eyebrow">${k.title}</p><h1 class="serif stage-title" style="max-width:760px">${k.title}</h1><p class="hero-copy">${k.copy}</p><div class="kit-layout"><div class="glass kit-tabs">${k.cats.map((x,i)=>`<button class="${i===kitCat?"active":""}" data-cat="${i}">${x}</button>`).join("")}</div><section class="glass kit-editor"><p class="eyebrow">${k.cats[kitCat]}</p><div class="kit-list">${d[kitCat].length?d[kitCat].map((x,i)=>`<div class="kit-item"><span>${esc(x)}</span><button data-remove="${i}">×</button></div>`).join(""):`<p class="stage-copy" style="margin-left:0">${k.empty}</p>`}</div><div class="add-row"><input id="kitInput" placeholder="${k.placeholder}"><button class="primary" id="kitAdd">${k.add}</button></div></section></div></main>`}
function feedbackView(){const f=T().feedback;return `<main class="screen">${back()}<section class="glass stage"><p class="eyebrow">${T().moment.label}</p><h1 class="serif stage-title">${f.title}</h1><p class="stage-copy">${f.copy}</p><div class="choice-grid">${f.ratings.map((x,i)=>`<button class="secondary ${rating===String(i)?"selected":""}" data-rating="${i}">${x}</button>`).join("")}</div><p class="eyebrow" style="margin-top:38px">${f.most}</p><div class="choice-grid">${f.opts.map((x,i)=>`<button class="secondary ${helped===String(i)?"selected":""}" data-helped="${i}">${x}</button>`).join("")}</div><div class="actions"><button class="primary" id="saveFeedback">${f.save}</button></div></section></main>`}
function finish(){rating="";helped="";completionId=`${Date.now()}-${currentType}`;add("return-history",{id:completionId,completedAt:new Date().toISOString(),module:currentType});go("feedback")}

 document.querySelectorAll("[data-body-next]").forEach(b=>b.onclick=()=>{bodyStep++;render()});document.querySelectorAll("[data-finish]").forEach(b=>b.onclick=finish);
 if($("#breath"))startBreath();if($("#timerRing"))startTimer();if($("#mindNext"))$("#mindNext").onclick=()=>{mindAnswers[mindStep]=$("#answer").value;mindStep++;render()};document.querySelectorAll("[data-mind]").forEach(b=>b.onclick=()=>{mindStep=b.dataset.mind==="yes"?4:5;render()});
 document.querySelectorAll("[data-help]").forEach(b=>b.onclick=()=>{$("#view").innerHTML=b.dataset.help==="calm"?helpCalm():helpSupport();bind()});if($("#copyTrust"))$("#copyTrust").onclick=async()=>{await navigator.clipboard.writeText(T().help.message);$("#copyTrust").firstChild.textContent=T().help.copied};if($("#emergencyInfo"))$("#emergencyInfo").onclick=()=>$("#emergencyInfo").textContent=T().help.danger;
 document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{kitCat=+b.dataset.cat;render()});document.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>{const d=kitData();d[kitCat].splice(+b.dataset.remove,1);localStorage.setItem("return-kit",JSON.stringify(d));render()});if($("#kitAdd"))$("#kitAdd").onclick=()=>{const v=$("#kitInput").value.trim();if(!v)return;const d=kitData();d[kitCat].push(v);localStorage.setItem("return-kit",JSON.stringify(d));render()};
 document.querySelectorAll("[data-rating]").forEach(b=>b.onclick=()=>{rating=b.dataset.rating;render()});document.querySelectorAll("[data-helped]").forEach(b=>b.onclick=()=>{helped=b.dataset.helped;render()});if($("#saveFeedback"))$("#saveFeedback").onclick=()=>{add("return-feedback",{completionId,answeredAt:new Date().toISOString(),module:currentType,rating:rating===""?null:+rating,helped:helped===""?null:+helped,language:lang});if(helped!=="")localStorage.setItem("return-last-help",helped);go("home")};
}
function startBreath(){clear();const cycle=()=>{$("#breath").className="breath in";$("#breathWord").textContent=T().body.inhale;$("#breathTime").textContent="4 "+T().body.seconds;timer=setTimeout(()=>{$("#breath").className="breath out";$("#breathWord").textContent=T().body.exhale;$("#breathTime").textContent="6 "+T().body.seconds;timer=setTimeout(cycle,6000)},4000)};cycle()}
function startTimer(){timerSec=180;timerRun=true;const update=()=>{if(!$("#timerText"))return;$("#timerText").textContent=`${String(Math.floor(timerSec/60)).padStart(2,"0")}:${String(timerSec%60).padStart(2,"0")}`;$("#timerRing").style.setProperty("--p",`${(180-timerSec)/180*360}deg`);$("#timerToggle").textContent=timerRun?T().body.pause:T().body.resume};$("#timerToggle").onclick=()=>{timerRun=!timerRun;update()};update();timer=setInterval(()=>{if(timerRun&&timerSec>0){timerSec--;update()}},1000)}
$("#homeBtn").onclick=()=>go("home");render();
</script>
</body></html>
